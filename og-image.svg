<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="'Manrope','Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1B2127"/>
      <stop offset="1" stop-color="#14181C"/>
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="12%" r="60%">
      <stop offset="0" stop-color="#C9F24E" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#C9F24E" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="54" height="54" patternUnits="userSpaceOnUse">
      <path d="M54 0H0V54" fill="none" stroke="#ffffff" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#card)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- brand mark: two overlapping squares -->
  <g transform="translate(80,80)">
    <rect x="0" y="0" width="46" height="46" rx="10" fill="#C9F24E"/>
    <rect x="26" y="26" width="46" height="46" rx="10" fill="#F4F1E9" fill-opacity="0.92"/>
  </g>
  <text x="172" y="116" fill="#F4F1E9" font-size="30" font-weight="800" letter-spacing="-0.5">Smart Little Systems</text>

  <!-- headline -->
  <text x="80" y="300" fill="#F4F1E9" font-size="78" font-weight="800" letter-spacing="-2">Smart websites &amp; <tspan fill="#C9F24E" font-style="italic" font-family="Georgia,serif">systems</tspan></text>
  <text x="80" y="386" fill="#F4F1E9" font-size="78" font-weight="800" letter-spacing="-2">that run the boring bits.</text>

  <!-- subline -->
  <text x="80" y="452" fill="#AAB4BC" font-size="30" font-weight="500">Web design · Automation · AI consultancy for small businesses</text>

  <!-- footer chip -->
  <g transform="translate(80,520)">
    <rect x="0" y="0" width="320" height="56" rx="28" fill="#C9F24E"/>
    <text x="160" y="37" fill="#14181C" font-size="22" font-weight="800" text-anchor="middle">smartlittlesystems.uk</text>
  </g>
  <text x="1120" y="557" fill="#6A7480" font-size="24" font-weight="600" text-anchor="end" font-family="'JetBrains Mono',monospace">Kimberley · Nottingham · UK-wide</text>
</svg>
